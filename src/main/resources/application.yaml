spring:
  application:
    name: ledger-service
  datasource:
    url: jdbc:h2:file:./data/ledger;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
